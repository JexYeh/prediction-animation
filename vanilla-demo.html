<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Icons Only Demo</title>
    <style>
        /* RD 同學：以下為核心動畫 CSS，複製到您的專案即可 */
        
        .icon-wrapper {
            position: relative;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 42px;
            height: 42px;
            margin: 20px;
        }

        /* --- Success Animation --- */
        .circle-outer-success {
            position: absolute;
            width: 42px;
            height: 42px;
            background-color: rgba(34, 197, 94, 0.18);
            border-radius: 50%;
            transform: scale(0);
            animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .circle-inner-success {
            position: absolute;
            width: 26px;
            height: 26px;
            background-color: #22C55E;
            border-radius: 50%;
            transform: scale(0);
            animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s forwards;
        }

        .checkmark {
            position: relative;
            z-index: 1;
            width: 16px;
            height: 16px;
        }

        .checkmark-path {
            stroke-dasharray: 20;
            stroke-dashoffset: 20;
            animation: drawLine 0.4s ease-out 0.4s forwards;
        }

        /* --- Error Animation --- */
        .circle-outer-error {
            position: absolute;
            width: 42px;
            height: 42px;
            background-color: rgba(239, 68, 68, 0.18);
            border-radius: 50%;
            transform: scale(0);
            animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .circle-inner-error {
            position: absolute;
            width: 26px;
            height: 26px;
            background-color: #EF4444;
            border-radius: 50%;
            transform: scale(0);
            animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s forwards;
        }

        .error-cross {
            position: relative;
            z-index: 1;
            width: 10px;
            height: 10px;
            transform: scale(0);
            transform-origin: center;
            animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s forwards;
        }

        /* Keyframes */
        @keyframes bounceIn {
            0% { transform: scale(0); }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes scaleIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        @keyframes drawLine {
            0% { stroke-dashoffset: 20; }
            100% { stroke-dashoffset: 0; }
        }

        /* 僅供預覽使用的背景 */
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
    </style>
</head>
<body>

    <!-- Success Icon -->
    <div class="icon-wrapper">
        <div class="circle-outer-success"></div>
        <div class="circle-inner-success"></div>
        <svg class="checkmark" viewBox="0 0 24 24" fill="none">
            <path d="M6 12L10 16L18 8" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" class="checkmark-path"/>
        </svg>
    </div>

    <!-- Error Icon -->
    <div class="icon-wrapper">
        <div class="circle-outer-error"></div>
        <div class="circle-inner-error)</div>
        <div class="circle-inner-error"></div>
        <svg class="error-cross" viewBox="0 0 8 8" fill="none">
            <path d="M1 1L7 7M7 1L1 7" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>

</body>
</html>
